<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPad StandBy Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ff3b30;
            --ios-blue: #0a84ff;
            --padding-edge: 24px;
            --gap: 20px;
            --font-clamp-normal: clamp(3rem, 10vw, 9rem);
            --font-clamp-reduced: clamp(2rem, 6vw, 5rem);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: #fff; }

        #aurora-canvas { position: fixed; inset: 0; z-index: -2; background: #000; display: block; }
        #dark-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.3); z-index: -1; pointer-events: none; }

        #app-container { 
            display: grid; 
            width: 100vw; 
            height: 100vh; 
            padding: var(--padding-edge);
            gap: 0;
        }

        @media (orientation: landscape) {
            #clock-widget { grid-column: 1; grid-row: 1 / span 3; }
            #div-v { grid-column: 2; grid-row: 1 / span 3; display: flex; }
            #weather-widget { grid-column: 3; grid-row: 1; }
            #div-h-land { grid-column: 3; grid-row: 2; display: flex; }
            #calendar-widget { grid-column: 3; grid-row: 3; }
            #div-h-port-1, #div-h-port-2 { display: none; }
        }

        @media (orientation: portrait) {
            #clock-widget { grid-row: 1; }
            #div-h-port-1 { grid-row: 2; display: flex; }
            #weather-widget { grid-row: 3; }
            #div-h-port-2 { grid-row: 4; display: flex; }
            #calendar-widget { grid-row: 5; }
            #div-v, #div-h-land { display: none; }
        }

        .divider { display: flex; align-items: center; justify-content: center; background: transparent; position: relative; z-index: 10; touch-action: none; }
        .divider::after { content: ''; background: #fff; border-radius: 10px; transition: all 0.2s; opacity: 0.25; }
        .divider.v { cursor: col-resize; width: var(--gap); } .divider.v::after { width: 4px; height: 40px; }
        .divider.h { cursor: row-resize; height: var(--gap); } .divider.h::after { width: 40px; height: 4px; }

        .widget {
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 32px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden;
        }

        #clock-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .digital-time { line-height: 1; text-align: center; font-variant-numeric: tabular-nums; font-size: var(--font-clamp-normal); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 95%; text-align: center; font-size: 0.9rem; }
        .day-cell { display: flex; align-items: center; justify-content: center; height: 32px; }
        .day-header { opacity: 0.4; font-weight: bold; font-size: 0.75rem; }
        .today-circle { background: var(--accent-color); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; }

        #settings-btn { position: fixed; bottom: 25px; right: 25px; background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 14px; border-radius: 50%; font-size: 1.6rem; z-index: 1000; cursor: pointer; }
        #settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1001; backdrop-filter: blur(15px); }
        .modal-content { background: #1c1c1e; width: 90%; max-width: 500px; max-height: 85vh; border-radius: 30px; padding: 30px; overflow-y: auto; border: 1px solid #38383a; position: relative; }
        .modal-close-x { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #8e8e93; font-size: 1.8rem; cursor: pointer; }

        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 15px; }
        .theme-circle { width: 42px; height: 42px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .theme-circle.active { border-color: #fff; transform: scale(1.1); }

        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .preview-card { background: #2c2c2e; border: 2px solid transparent; border-radius: 14px; padding: 14px; text-align: center; cursor: pointer; }
        .preview-card.active { border-color: var(--ios-blue); }

        .toggle-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #38383a; }
        .switch { position: relative; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle { position: absolute; inset: 0; background-color: #39393d; border-radius: 34px; cursor: pointer; transition: .3s; }
        .slider-toggle:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
        input:checked + .slider-toggle { background-color: #34c759; }
        input:checked + .slider-toggle:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <canvas id="aurora-canvas"></canvas>
    <div id="dark-overlay"></div>

    <div id="app-container">
        <div class="widget" id="clock-widget"><div id="clock-content"></div></div>
        <div id="div-v" class="divider v"></div>
        <div id="div-h-port-1" class="divider h"></div>
        <div class="widget" id="weather-widget">
            <div id="weather-icon" style="font-size: 3rem;">☀️</div>
            <div id="temp" style="font-size: 2.5rem; font-weight: 600;">--°</div>
            <div id="condition">Loading...</div>
            <div id="location" style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">📍 Detecting...</div>
        </div>
        <div id="div-h-land" class="divider h"></div>
        <div id="div-h-port-2" class="divider h"></div>
        <div class="widget" id="calendar-widget">
            <div id="cal-title" style="font-weight:600; margin-bottom:8px;">Month</div>
            <div id="cal-grid" class="calendar-grid"></div>
        </div>
    </div>

    <button id="settings-btn">⚙️</button>

    <div id="settings-modal">
        <div class="modal-content">
            <button class="modal-close-x" id="modal-cancel">&times;</button>
            <h2 style="margin-top:0">Settings</h2>
            
            <div class="setting-section">
                <h3 style="font-size:0.8rem; color:#8e8e93;">🌌 AURORA THEME</h3>
                <div class="theme-grid" id="theme-grid"></div>
            </div>

            <div class="setting-section" style="margin-top:20px;">
                <h3 style="font-size:0.8rem; color:#8e8e93;">CLOCK STYLE</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="clockStyle" data-val="digital">Digital</div>
                    <div class="preview-card" data-key="clockStyle" data-val="analogue">Analogue</div>
                </div>
            </div>

            <div class="setting-section" style="margin-top:20px;">
                <div class="toggle-item"><span>Seconds</span><label class="switch"><input type="checkbox" id="check-seconds"><span class="slider-toggle"></span></label></div>
                <div class="toggle-item"><span>Date</span><label class="switch"><input type="checkbox" id="check-date"><span class="slider-toggle"></span></label></div>
            </div>
        </div>
    </div>

    <script>
        const auroraThemes = [
            { colors: ['#00ffd5', '#0081ff', '#651fff', '#000000'] },
            { colors: ['#ff6d00', '#f50057', '#ff1744', '#4a148c'] },
            { colors: ['#01579b', '#00bcd4', '#006064', '#000000'] },
            { colors: ['#4a148c', '#7b1fa2', '#c51162', '#1a237e'] },
            { colors: ['#1b5e20', '#c6ff00', '#00695c', '#000000'] }
        ];

        let state = {
            clockStyle: 'digital',
            auroraTheme: 0,
            showSeconds: true,
            showDate: true,
            gridL: { c: 1, r: 1 },
            gridP: { r1: 1, r2: 1, r3: 1 }
        };

        const persist = () => localStorage.setItem('standby_v28', JSON.stringify(state));

        // --- AURORA ENGINE ---
        let auroraCanvas, aCtx, blobs = [];

        function initAurora() {
            auroraCanvas = document.getElementById('aurora-canvas');
            aCtx = auroraCanvas.getContext('2d');
            window.addEventListener('resize', resizeAurora);
            resizeAurora();
            blobs = Array.from({length: 6}, () => ({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 500 + 400,
                phase: Math.random() * Math.PI * 2,
                speed: 0.0002 + Math.random() * 0.0004
            }));
            animateAurora();
        }

        function resizeAurora() {
            auroraCanvas.width = window.innerWidth;
            auroraCanvas.height = window.innerHeight;
        }

        function animateAurora() {
            const w = auroraCanvas.width, h = auroraCanvas.height;
            const time = Date.now();
            const colors = auroraThemes[state.auroraTheme].colors;

            aCtx.globalAlpha = 1;
            aCtx.fillStyle = '#000';
            aCtx.fillRect(0, 0, w, h);

            blobs.forEach((b, i) => {
                const color = colors[i % colors.length];
                const driftX = Math.sin(time * b.speed + b.phase) * (w * 0.2);
                const driftY = Math.cos(time * b.speed * 0.7 + b.phase) * (h * 0.2);
                const curX = ((b.x + driftX) % w + w) % w;
                const curY = ((b.y + driftY) % h + h) % h;

                const grad = aCtx.createRadialGradient(curX, curY, 0, curX, curY, b.r);
                grad.addColorStop(0, color);
                grad.addColorStop(1, 'transparent');

                aCtx.globalAlpha = 0.5;
                aCtx.fillStyle = grad;
                aCtx.beginPath();
                aCtx.arc(curX, curY, b.r, 0, Math.PI * 2);
                aCtx.fill();
            });
            requestAnimationFrame(animateAurora);
        }

        // --- CLOCK & UI ---
        function updateClock() {
            const container = document.getElementById('clock-content');
            const now = new Date();
            if (state.clockStyle === 'digital') {
                const sec = state.showSeconds ? `<span style="opacity:0.4; font-size:0.5em;">:${String(now.getSeconds()).padStart(2,'0')}</span>` : '';
                container.innerHTML = `<div class="digital-time">${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}${sec}</div>` +
                    (state.showDate ? `<div style="font-size:1.5rem; opacity:0.7;">${now.toLocaleDateString('en-US',{weekday:'long', month:'short', day:'numeric'})}</div>` : '');
            } else {
                container.innerHTML = `<div style="font-size:2rem;">Analogue Placeholder</div>`; // アナログ描画ロジックはここに追加
            }
        }

        function updateCalendar() {
            const now = new Date();
            document.getElementById('cal-title').textContent = now.toLocaleDateString('en-US', { month: 'long' });
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for (let i = 0; i < first; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= days; d++) {
                const isToday = d === now.getDate();
                grid.innerHTML += `<div class="day-cell">${isToday ? `<div class="today-circle">${d}</div>` : d}</div>`;
            }
        }

        function init() {
            const saved = localStorage.getItem('standby_v28');
            if (saved) state = { ...state, ...JSON.parse(saved) };

            initAurora();
            updateCalendar();
            setInterval(updateClock, 1000);
            updateClock();

            // Settings Logic
            const modal = document.getElementById('settings-modal');
            document.getElementById('settings-btn').onclick = () => modal.style.display = 'flex';
            document.getElementById('modal-cancel').onclick = () => modal.style.display = 'none';

            // Theme Circles
            const themeGrid = document.getElementById('theme-grid');
            auroraThemes.forEach((t, i) => {
                const c = document.createElement('div');
                c.className = `theme-circle ${state.auroraTheme === i ? 'active' : ''}`;
                c.style.background = t.colors[0];
                c.onclick = () => {
                    state.auroraTheme = i;
                    document.querySelectorAll('.theme-circle').forEach(el => el.classList.remove('active'));
                    c.classList.add('active');
                    persist();
                };
                themeGrid.appendChild(c);
            });

            // Toggles
            const secToggle = document.getElementById('check-seconds');
            secToggle.checked = state.showSeconds;
            secToggle.onchange = (e) => { state.showSeconds = e.target.checked; persist(); };

            const dateToggle = document.getElementById('check-date');
            dateToggle.checked = state.showDate;
            dateToggle.onchange = (e) => { state.showDate = e.target.checked; persist(); };
            
            document.querySelectorAll('.preview-card').forEach(card => {
                if(card.dataset.val === state.clockStyle) card.classList.add('active');
                card.onclick = () => {
                    state.clockStyle = card.dataset.val;
                    document.querySelectorAll('.preview-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    persist();
                };
            });
        }

        window.onload = init;
    </script>
</body>
</html>
