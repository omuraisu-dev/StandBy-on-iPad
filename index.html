<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>iPad StandBy Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ff3b30;
            --ios-blue: #0a84ff;
            --padding-edge: 24px;
            --gap: 12px;
            
            /* Grid Defaults */
            --lc: 1fr; --lr: 1fr;
            --pr1: 1fr; --pr2: 1fr;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: #fff; }

        #wallpaper-bg { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: -2; transition: background-image 0.5s; }
        #dark-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: -1; }

        /* Resizable Grid Layout */
        #app-container {
            display: grid;
            width: 100vw;
            height: 100vh;
            padding: var(--padding-edge);
        }

        @media (orientation: landscape) {
            #app-container {
                grid-template-columns: var(--lc) var(--gap) 1fr;
                grid-template-rows: var(--lr) var(--gap) 1fr;
            }
            #clock-widget { grid-column: 1; grid-row: 1 / span 3; }
            #div-v { grid-column: 2; grid-row: 1 / span 3; display: flex; }
            #weather-widget { grid-column: 3; grid-row: 1; }
            #div-h-land { grid-column: 3; grid-row: 2; display: flex; }
            #calendar-widget { grid-column: 3; grid-row: 3; }
            
            #div-h-port-1, #div-h-port-2 { display: none; }
        }

        @media (orientation: portrait) {
            #app-container {
                grid-template-columns: 1fr;
                grid-template-rows: var(--pr1) var(--gap) var(--pr2) var(--gap) 1fr;
            }
            #clock-widget { grid-row: 1; }
            #div-h-port-1 { grid-row: 2; display: flex; }
            #weather-widget { grid-row: 3; }
            #div-h-port-2 { grid-row: 4; display: flex; }
            #calendar-widget { grid-row: 5; }
            
            #div-v, #div-h-land { display: none; }
        }

        /* Divider Styling */
        .divider {
            align-items: center; justify-content: center;
            background: transparent; transition: background 0.2s;
            position: relative; z-index: 10;
        }
        .divider::after {
            content: ''; background: rgba(255,255,255,0.2);
            border-radius: 10px; transition: all 0.2s;
        }
        .divider:hover::after, .divider.dragging::after { background: var(--ios-blue); box-shadow: 0 0 10px var(--ios-blue); }

        .divider.v { cursor: col-resize; width: var(--gap); }
        .divider.v::after { width: 4px; height: 40px; }
        
        .divider.h { cursor: row-resize; height: var(--gap); }
        .divider.h::after { width: 40px; height: 4px; }

        /* Widget Styling */
        .widget {
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 32px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden;
        }

        #clock-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .digital-time { line-height: 1; text-align: center; font-variant-numeric: tabular-nums; }

        #weather-icon { font-size: 4rem; line-height: 1; }
        #temp { font-size: 3rem; font-weight: 300; line-height: 1; }
        #condition { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2px; }
        #location { font-size: 0.8rem; opacity: 0.5; font-weight: 300; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 90%; text-align: center; }
        .day-cell { display: flex; align-items: center; justify-content: center; height: 32px; font-size: 0.85rem; }
        .day-header { height: 20px; opacity: 0.4; font-weight: bold; font-size: 0.7rem; }
        .today-circle { background: #fff; color: #000; width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }

        /* Settings UI */
        #settings-btn { position: fixed; bottom: 25px; right: 25px; background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 14px; border-radius: 50%; font-size: 1.6rem; z-index: 1000; cursor: pointer; }
        #settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1001; backdrop-filter: blur(15px); }
        .modal-content { background: #1c1c1e; width: 90%; max-width: 500px; max-height: 85vh; border-radius: 30px; padding: 30px; overflow-y: auto; border: 1px solid #38383a; position: relative; }
        .modal-close-x { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #8e8e93; font-size: 1.8rem; cursor: pointer; }

        .setting-section { margin-bottom: 25px; }
        .setting-section h3 { font-size: 0.75rem; color: #8e8e93; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
        
        .slider-wrap { padding: 10px 0; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: #8e8e93; margin-top: 8px; }
        input[type=range] { width: 100%; height: 6px; border-radius: 5px; background: #39393d; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .preview-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .preview-card { background: #2c2c2e; border: 2px solid transparent; border-radius: 14px; padding: 12px; text-align: center; font-size: 0.8rem; cursor: pointer; }
        .preview-card.active { border-color: var(--ios-blue); background: #3a3a3c; }
        
        .switch { position: relative; width: 48px; height: 26px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle { position: absolute; inset: 0; background-color: #39393d; border-radius: 34px; cursor: pointer; transition: .3s; }
        .slider-toggle:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
        input:checked + .slider-toggle { background-color: #34c759; }
        input:checked + .slider-toggle:before { transform: translateX(22px); }
        
        #wp-status { display: block; margin-top: 8px; font-size: 0.8rem; height: 1rem; color: #34c759; }
    </style>
</head>
<body>

    <div id="wallpaper-bg"></div>
    <div id="dark-overlay"></div>

    <div id="app-container">
        <!-- Widgets -->
        <div class="widget" id="clock-widget"><div id="clock-content"></div></div>
        
        <div id="div-v" class="divider v"></div>
        <div id="div-h-port-1" class="divider h"></div>
        
        <div class="widget" id="weather-widget">
            <div id="weather-icon">--</div>
            <div id="temp">--°</div>
            <div id="condition">Locating...</div>
            <div id="location">📍 Detect Location...</div>
        </div>

        <div id="div-h-land" class="divider h"></div>
        <div id="div-h-port-2" class="divider h"></div>

        <div class="widget" id="calendar-widget">
            <div id="cal-title" style="font-weight:600; margin-bottom:8px; font-size: 1.1rem;">Month</div>
            <div id="cal-grid" class="calendar-grid"></div>
        </div>
    </div>

    <button id="settings-btn">⚙️</button>

    <div id="settings-modal">
        <div class="modal-content">
            <button class="modal-close-x" id="modal-cancel">&times;</button>
            <h2 style="margin-top:0">Settings</h2>
            
            <div class="setting-section">
                <h3>Wallpaper</h3>
                <input type="file" id="wp-input" accept="image/*" style="width:100%; color:white;">
                <span id="wp-status"></span>
            </div>

            <div class="setting-section">
                <h3>Clock Style</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="clockStyle" data-val="digital">Digital</div>
                    <div class="preview-card" data-key="clockStyle" data-val="analogue">Analogue</div>
                </div>
            </div>

            <div id="digital-options">
                <div class="setting-section">
                    <h3>Digital Font</h3>
                    <div class="preview-grid">
                        <div class="preview-card" data-key="font" data-val="Inter" style="font-family:'Inter'">Inter</div>
                        <div class="preview-card" data-key="font" data-val="Bebas Neue" style="font-family:'Bebas Neue'">Bebas</div>
                    </div>
                </div>

                <div class="setting-section">
                    <h3>Clock Size</h3>
                    <div class="slider-wrap">
                        <input type="range" id="clock-size-slider" min="0" max="2" step="1" value="1">
                        <div class="slider-labels">
                            <span>Small</span>
                            <span>Medium</span>
                            <span>Large</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="setting-section" id="analogue-faces" style="display:none">
                <h3>Analogue Face</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="face" data-val="minimal">Minimal</div>
                    <div class="preview-card" data-key="face" data-val="classic">Classic</div>
                    <div class="preview-card" data-key="face" data-val="outlined">Outlined</div>
                </div>
            </div>

            <div class="setting-section">
                <h3>Display</h3>
                <div class="toggle-item"><span>Seconds</span><label class="switch"><input type="checkbox" id="check-seconds"><span class="slider-toggle"></span></label></div>
                <div class="toggle-item"><span>Date</span><label class="switch"><input type="checkbox" id="check-date"><span class="slider-toggle"></span></label></div>
                <div class="toggle-item"><span>Day</span><label class="switch"><input type="checkbox" id="check-day"><span class="slider-toggle"></span></label></div>
            </div>

            <button id="apply-btn" style="width:100%; padding:18px; border-radius:16px; background:var(--ios-blue); color:#fff; border:none; font-weight:600; margin-top:10px; cursor:pointer;">Apply Changes</button>
        </div>
    </div>

    <script>
        const sizes = ['small', 'medium', 'large'];
        let state = {
            clockStyle: 'digital', font: 'Inter', face: 'minimal', clockSize: 'medium',
            showSeconds: true, showDate: true, showDay: true, wallpaper: null,
            gridL: { c: 1, r: 1 }, gridP: { r1: 1, r2: 1 }
        };

        const fontClamps = {
            small: { l: 'clamp(2rem, 6vw, 5rem)', p: 'clamp(3rem, 12vw, 8rem)' },
            medium: { l: 'clamp(3rem, 10vw, 9rem)', p: 'clamp(4rem, 18vw, 12rem)' },
            large: { l: 'clamp(4rem, 14vw, 13rem)', p: 'clamp(6rem, 24vw, 16rem)' }
        };

        /** WAKE LOCK **/
        let wakeLock = null;
        async function getWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (wakeLock) await wakeLock.release();
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (e) {}
            }
        }
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') getWakeLock(); });

        /** CLOCK ENGINE **/
        let clockCanvas, ctx, resizeObserver;
        function drawAnalogue() {
            if (state.clockStyle !== 'analogue') return;
            const content = document.getElementById('clock-content');
            if (!clockCanvas) { clockCanvas = document.createElement('canvas'); ctx = clockCanvas.getContext('2d'); }
            if (!content.contains(clockCanvas)) { content.innerHTML = ''; content.appendChild(clockCanvas); }
            
            const rect = content.getBoundingClientRect();
            const dpr = window.devicePixelRatio;
            clockCanvas.width = rect.width * dpr; clockCanvas.height = rect.height * dpr;
            
            const w = clockCanvas.width, h = clockCanvas.height;
            const radius = (Math.min(w, h) / 2) * 0.82;
            ctx.clearRect(0, 0, w, h); ctx.save(); ctx.translate(w / 2, h / 2); ctx.lineCap = 'round';

            ctx.save();
            if (state.face === 'outlined') {
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2 * dpr; ctx.stroke();
                for (let i = 0; i < 12; i++) { ctx.rotate(Math.PI / 6); ctx.beginPath(); ctx.moveTo(0, -radius + (12 * dpr)); ctx.lineTo(0, -radius + (2 * dpr)); ctx.stroke(); }
            } else if (state.face === 'classic') {
                ctx.fillStyle = '#fff'; ctx.font = `bold ${radius * 0.18}px Inter`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                for (let i = 1; i <= 12; i++) { const ang = i * Math.PI / 6; ctx.fillText(i.toString(), radius * 0.82 * Math.sin(ang), -radius * 0.82 * Math.cos(ang)); }
                for (let i = 0; i < 60; i++) { ctx.rotate(Math.PI / 30); ctx.beginPath(); ctx.moveTo(0, -radius); ctx.lineTo(0, -radius + (i % 5 === 0 ? 12 : 5) * dpr); ctx.strokeStyle = i % 5 === 0 ? '#fff' : 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5 * dpr; ctx.stroke(); }
            }
            ctx.restore();

            const now = new Date();
            const hrs = now.getHours() % 12, mins = now.getMinutes(), secs = now.getSeconds();
            const drawHand = (ang, len, wid, col) => { ctx.save(); ctx.rotate(ang); ctx.beginPath(); ctx.strokeStyle = col; ctx.lineWidth = wid; ctx.moveTo(0, len * 0.18); ctx.lineTo(0, -len); ctx.stroke(); ctx.restore(); };
            drawHand((hrs * Math.PI / 6) + (mins * Math.PI / 360), radius * 0.5, 7 * dpr, '#fff');
            drawHand((mins * Math.PI / 30) + (secs * Math.PI / 1800), radius * 0.8, 4.5 * dpr, '#fff');
            if (state.showSeconds) drawHand(secs * Math.PI / 30, radius * 0.9, 2 * dpr, state.face === 'outlined' ? '#fff' : '#ff3b30');
            ctx.beginPath(); ctx.arc(0, 0, 5 * dpr, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
            ctx.restore();
        }

        function updateClock() {
            const now = new Date();
            const container = document.getElementById('clock-content');
            if (state.clockStyle === 'digital') {
                const isLand = window.matchMedia("(orientation: landscape)").matches;
                const fontSize = isLand ? fontClamps[state.clockSize].l : fontClamps[state.clockSize].p;
                const s = state.showSeconds ? `<span style="font-size:0.5em; opacity:0.4">:${String(now.getSeconds()).padStart(2,'0')}</span>` : '';
                container.innerHTML = `<div class="digital-time" style="font-family:'${state.font}'; font-size:${fontSize}">${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}${s}</div>` +
                ((state.showDate || state.showDay) ? `<div style="font-size:1.4rem; opacity:0.8; margin-top:8px; font-weight:300;">${state.showDay ? now.toLocaleDateString('en-US',{weekday:'long'}) : ''}${state.showDay && state.showDate ? ', ':''}${state.showDate ? now.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''}</div>` : '');
            } else drawAnalogue();
        }

        /** DIVIDER LOGIC **/
        function initGridInteraction() {
            const container = document.getElementById('app-container');
            const minSize = 150;

            const handleDrag = (divider, type, callback) => {
                const onMove = (e) => {
                    const t = e.touches ? e.touches[0] : e;
                    const rect = container.getBoundingClientRect();
                    const padding = 24;
                    const gap = 12;

                    if (type === 'v') {
                        const x = t.clientX - rect.left - padding;
                        const totalW = rect.width - (padding * 2) - gap;
                        if (x > minSize && (totalW - x) > minSize) {
                            const ratio = x / (totalW - x);
                            container.style.setProperty('--lc', `${ratio}fr`);
                            state.gridL.c = ratio;
                        }
                    } else if (type === 'h-land') {
                        const y = t.clientY - rect.top - padding;
                        const totalH = rect.height - (padding * 2) - gap;
                        if (y > minSize && (totalH - y) > minSize) {
                            const ratio = y / (totalH - y);
                            container.style.setProperty('--lr', `${ratio}fr`);
                            state.gridL.r = ratio;
                        }
                    } else if (type === 'h-p1') {
                        const y = t.clientY - rect.top - padding;
                        const totalH = rect.height - (padding * 2) - (gap * 2);
                        // Approximate logic for 3 rows
                        const r1 = Math.max(minSize, y);
                        container.style.setProperty('--pr1', `${r1}px`);
                        state.gridP.r1 = r1;
                    } else if (type === 'h-p2') {
                        const r1 = parseInt(getComputedStyle(container).getPropertyValue('--pr1')) || minSize;
                        const y = t.clientY - rect.top - padding - r1 - gap;
                        container.style.setProperty('--pr2', `${Math.max(minSize, y)}px`);
                        state.gridP.r2 = Math.max(minSize, y);
                    }
                };
                const onEnd = () => {
                    divider.classList.remove('dragging');
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onEnd);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onEnd);
                    localStorage.setItem('standby_v14', JSON.stringify(state));
                };
                divider.onmousedown = divider.ontouchstart = (e) => {
                    e.preventDefault();
                    divider.classList.add('dragging');
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onEnd);
                    window.addEventListener('touchmove', onMove, { passive: false });
                    window.addEventListener('touchend', onEnd);
                };
            };

            handleDrag(document.getElementById('div-v'), 'v');
            handleDrag(document.getElementById('div-h-land'), 'h-land');
            handleDrag(document.getElementById('div-h-port-1'), 'h-p1');
            handleDrag(document.getElementById('div-h-port-2'), 'h-p2');
        }

        /** WEATHER & CALENDAR **/
        async function fetchWeather() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const { latitude, longitude } = pos.coords;
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                    const d = await res.json();
                    document.getElementById('temp').textContent = Math.round(d.current_weather.temperature) + '°';
                    const icons = { 0:'☀️',1:'🌤️',45:'🌫️',51:'🌦️',71:'❄️',80:'🌧️',95:'⛈️' };
                    document.getElementById('weather-icon').textContent = icons[d.current_weather.weathercode] || '🌤️';
                    document.getElementById('condition').textContent = d.current_weather.weathercode < 3 ? "Clear" : "Overcast";
                    const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}&email=standby@app.local`);
                    const g = await geo.json();
                    document.getElementById('location').textContent = `📍 ${g.address.city || g.address.town || "Nearby"}`;
                } catch (e) {}
            });
        }

        function updateCalendar() {
            const now = new Date();
            document.getElementById('cal-title').textContent = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
            for (let i = 0; i < first; i++) grid.innerHTML += `<div class="day-cell"></div>`;
            for (let d = 1; d <= days; d++) grid.innerHTML += `<div class="day-cell">${d === now.getDate() ? `<div class="today-circle">${d}</div>` : d}</div>`;
        }

        /** INIT **/
        function init() {
            const saved = localStorage.getItem('standby_v14');
            if (saved) {
                state = { ...state, ...JSON.parse(saved) };
                const root = document.documentElement;
                root.style.setProperty('--lc', `${state.gridL.c}fr`);
                root.style.setProperty('--lr', `${state.gridL.r}fr`);
                root.style.setProperty('--pr1', isNaN(state.gridP.r1) ? '1fr' : `${state.gridP.r1}px`);
                root.style.setProperty('--pr2', isNaN(state.gridP.r2) ? '1fr' : `${state.gridP.r2}px`);
            }
            if (state.wallpaper) document.getElementById('wallpaper-bg').style.backgroundImage = `url(${state.wallpaper})`;
            document.getElementById('check-seconds').checked = state.showSeconds;
            document.getElementById('check-date').checked = state.showDate;
            document.getElementById('check-day').checked = state.showDay;
            document.getElementById('clock-size-slider').value = sizes.indexOf(state.clockSize);

            updateActiveCards();
            updateCalendar();
            fetchWeather();
            initGridInteraction();
            getWakeLock();
            
            const tick = () => { updateClock(); setTimeout(tick, 1000 - (Date.now() % 1000)); };
            tick();
        }

        window.addEventListener('orientationchange', () => {
            const root = document.documentElement;
            root.style.setProperty('--lc', '1fr'); root.style.setProperty('--lr', '1fr');
            root.style.setProperty('--pr1', '1fr'); root.style.setProperty('--pr2', '1fr');
            setTimeout(updateClock, 200);
        });

        const modal = document.getElementById('settings-modal');
        document.getElementById('settings-btn').onclick = () => modal.style.display = 'flex';
        document.getElementById('modal-cancel').onclick = () => modal.style.display = 'none';
        modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
        document.getElementById('apply-btn').onclick = () => { localStorage.setItem('standby_v14', JSON.stringify(state)); modal.style.display = 'none'; };
        
        document.querySelectorAll('.preview-card').forEach(card => {
            card.onclick = () => { state[card.dataset.key] = card.dataset.val; updateActiveCards(); updateClock(); };
        });

        document.getElementById('clock-size-slider').oninput = (e) => {
            state.clockSize = sizes[e.target.value];
            updateClock();
        };

        ['seconds', 'date', 'day'].forEach(k => document.getElementById(`check-${k}`).onchange = (e) => { state[`show${k.charAt(0).toUpperCase()+k.slice(1)}`] = e.target.checked; updateClock(); });
        
        document.getElementById('wp-input').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 1280) { h *= 1280/w; w = 1280; }
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    const data = c.toDataURL('image/jpeg', 0.75);
                    state.wallpaper = data;
                    document.getElementById('wallpaper-bg').style.backgroundImage = `url(${data})`;
                    localStorage.setItem('standby_v14', JSON.stringify(state));
                    document.getElementById('wp-status').textContent = "✓ Saved";
                };
                img.src = ev.target.result;
            };
            r.readAsDataURL(e.target.files[0]);
        };

        function updateActiveCards() {
            document.querySelectorAll('.preview-card').forEach(card => card.classList.toggle('active', state[card.dataset.key] === card.dataset.val));
            document.getElementById('digital-options').style.display = state.clockStyle === 'digital' ? 'block' : 'none';
            document.getElementById('analogue-faces').style.display = state.clockStyle === 'analogue' ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
