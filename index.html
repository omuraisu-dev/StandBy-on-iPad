<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPad StandBy Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ff3b30;
            --ios-blue: #0a84ff;
            --padding-edge: 24px;
            --gap: 20px;
            --font-clamp-normal: clamp(3rem, 10vw, 9rem);
            --font-clamp-reduced: clamp(2rem, 6vw, 5rem);
            --content-scale-mult: 1.0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: #fff; }

        #wallpaper-bg { 
            position: fixed; inset: 0; 
            background-size: cover; 
            background-position: center; 
            background-color: transparent;
            z-index: -2; 
            transition: background-image 0.5s; 
        }
        #dark-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: -1; }

        #app-container { display: grid; width: 100vw; height: 100vh; padding: var(--padding-edge); }

        @media (orientation: landscape) {
            #clock-widget { grid-column: 1; grid-row: 1 / span 3; }
            #div-v { grid-column: 2; grid-row: 1 / span 3; display: flex; }
            #weather-widget { grid-column: 3; grid-row: 1; }
            #div-h-land { grid-column: 3; grid-row: 2; display: flex; }
            #calendar-widget { grid-column: 3; grid-row: 3; }
            #div-h-port-1, #div-h-port-2 { display: none; }
        }

        @media (orientation: portrait) {
            #clock-widget { grid-row: 1; }
            #div-h-port-1 { grid-row: 2; display: flex; }
            #weather-widget { grid-row: 3; }
            #div-h-port-2 { grid-row: 4; display: flex; }
            #calendar-widget { grid-row: 5; }
            #div-v, #div-h-land { display: none; }
        }

        .divider { display: flex; align-items: center; justify-content: center; background: transparent; position: relative; z-index: 10; touch-action: none; }
        .divider::after { content: ''; background: #fff; border-radius: 10px; transition: all 0.2s; opacity: 0.25; }
        .divider:hover::after, .divider.dragging::after { background: var(--ios-blue); box-shadow: 0 0 12px var(--ios-blue); opacity: 1; }
        .divider.v { cursor: col-resize; width: var(--gap); } 
        .divider.v::after { width: 4px; height: 40px; }
        .divider.h { cursor: row-resize; height: var(--gap); } 
        .divider.h::after { width: 40px; height: 4px; }

        .widget {
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 32px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden;
        }

        #clock-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .digital-time { line-height: 1; text-align: center; font-variant-numeric: tabular-nums; font-size: var(--font-clamp-normal); }

        #settings-btn { position: fixed; bottom: 25px; right: 25px; background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 14px; border-radius: 50%; font-size: 1.6rem; z-index: 1000; cursor: pointer; }
        #settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1001; backdrop-filter: blur(15px); }
        .modal-content { background: #1c1c1e; width: 90%; max-width: 500px; max-height: 85vh; border-radius: 30px; padding: 30px; overflow-y: auto; border: 1px solid #38383a; position: relative; }
        
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .preview-card { background: #2c2c2e; border: 2px solid transparent; border-radius: 14px; padding: 14px; text-align: center; font-size: 0.85rem; cursor: pointer; }
        .preview-card.active { border-color: var(--ios-blue); background: #3a3a3c; }
        
        .toggle-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #38383a; }
        .switch { position: relative; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle { position: absolute; inset: 0; background-color: #39393d; border-radius: 34px; cursor: pointer; transition: .3s; }
        .slider-toggle:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
        input:checked + .slider-toggle { background-color: #34c759; }
        input:checked + .slider-toggle:before { transform: translateX(22px); }

        /* Weather/Calendar items */
        #weather-icon { font-size: 4.5rem; line-height: 1; margin-bottom: 5px; }
        #temp { font-size: 3.5rem; font-weight: 300; line-height: 1; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 95%; text-align: center; font-size: 0.9rem; }
        .day-cell { display: flex; align-items: center; justify-content: center; height: 36px; }
        .today-circle { background: var(--accent-color); color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }
    </style>
</head>
<body>

    <div id="wallpaper-bg"></div>
    <div id="dark-overlay"></div>

    <div id="app-container">
        <div class="widget" id="clock-widget"><div id="clock-content"></div></div>
        <div id="div-v" class="divider v"></div>
        <div id="div-h-port-1" class="divider h"></div>
        <div class="widget" id="weather-widget">
            <div id="weather-icon">--</div>
            <div id="temp">--°</div>
            <div id="condition">Locating...</div>
            <div id="location">📍 Detect Location...</div>
        </div>
        <div id="div-h-land" class="divider h"></div>
        <div id="div-h-port-2" class="divider h"></div>
        <div class="widget" id="calendar-widget">
            <div id="cal-title" style="font-weight:600; margin-bottom:8px; font-size: 1.1rem;">Month</div>
            <div id="cal-grid" class="calendar-grid"></div>
        </div>
    </div>

    <button id="settings-btn">⚙️</button>

    <div id="settings-modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Settings</h2>
            <div style="margin-bottom:20px;">
                <label>Wallpaper:</label>
                <input type="file" id="wp-input" accept="image/*" style="display:block; margin-top:10px; color:white;">
                <span id="wp-status" style="font-size:0.8rem;"></span>
            </div>
            <div style="margin-bottom:20px;">
                <label>Clock Style:</label>
                <div class="preview-grid">
                    <div class="preview-card" onclick="updateState('clockStyle', 'digital')">Digital</div>
                    <div class="preview-card" onclick="updateState('clockStyle', 'analogue')">Analogue</div>
                    <div class="preview-card" onclick="updateState('clockStyle', 'square')">Square Analogue</div>
                </div>
            </div>
            <div class="toggle-item"><span>Seconds</span><label class="switch"><input type="checkbox" id="check-seconds" onchange="updateState('showSeconds', this.checked)"><span class="slider-toggle"></span></label></div>
            <button onclick="document.getElementById('settings-modal').style.display='none'" style="width:100%; padding:15px; margin-top:20px; border-radius:15px; border:none; background:var(--ios-blue); color:white; font-weight:bold;">Close</button>
        </div>
    </div>

    <script>
        let state = {
            clockStyle: 'digital', font: 'Inter', face: 'minimal', clockSize: 'medium', contentScale: 'normal',
            showSeconds: true, showDate: true, showDay: true, wallpaper: null,
            gridL: { c: 1, r: 1 }, gridP: { r1: 1, r2: 1, r3: 1 }
        };

        const weatherIconMap = { 0:'☀️',1:'🌤️',2:'🌤️',3:'🌤️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',56:'🌦️',57:'🌦️',61:'🌦️',63:'🌦️',65:'🌦️',66:'🌦️',67:'🌦️',71:'❄️',73:'❄️',75:'❄️',77:'❄️',80:'🌧️',81:'🌧️',82:'🌧️',95:'⛈️',96:'⛈️',99:'⛈️' };
        const fontClamps = {
            xs: { l: 'clamp(1.5rem, 4vw, 3.5rem)', p: 'clamp(2rem, 8vw, 5rem)' },
            small: { l: 'clamp(2rem, 6vw, 5rem)', p: 'clamp(3rem, 12vw, 8rem)' },
            medium: { l: 'clamp(3rem, 10vw, 9rem)', p: 'clamp(4rem, 18vw, 12rem)' },
            large: { l: 'clamp(4rem, 14vw, 13rem)', p: 'clamp(6rem, 24vw, 16rem)' },
            xl: { l: 'clamp(5rem, 18vw, 16rem)', p: 'clamp(7rem, 28vw, 20rem)' }
        };

        function persist() { localStorage.setItem('standby_v23', JSON.stringify(state)); }

        function applyGrid() {
            const container = document.getElementById('app-container');
            const isLand = window.matchMedia("(orientation: landscape)").matches;
            if (isLand) {
                container.style.gridTemplateColumns = `${state.gridL.c}fr 20px 1fr`;
                container.style.gridTemplateRows = `${state.gridL.r}fr 20px 1fr`;
            } else {
                container.style.gridTemplateColumns = `1fr`;
                container.style.gridTemplateRows = `${state.gridP.r1}fr 20px ${state.gridP.r2}fr 20px ${state.gridP.r3}fr`;
            }
        }

        function drawAnalogue() {
            if (state.clockStyle !== 'analogue' && state.clockStyle !== 'square') return;
            const content = document.getElementById('clock-content');
            let canvas = content.querySelector('canvas');
            if (!canvas) { 
                canvas = document.createElement('canvas'); 
                content.innerHTML = ''; 
                content.appendChild(canvas); 
            }
            const ctx = canvas.getContext('2d');
            const rect = content.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            
            const side = Math.min(canvas.width, canvas.height) * 0.8;
            const radius = side / 2;

            // Square Frame if needed
            if (state.clockStyle === 'square') {
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 4 * dpr;
                ctx.strokeRect(-side/2, -side/2, side, side);
            }

            // Draw ticks
            for (let i = 0; i < 60; i++) {
                ctx.beginPath();
                const isHour = i % 5 === 0;
                const len = isHour ? 15 * dpr : 7 * dpr;
                ctx.moveTo(0, -radius);
                ctx.lineTo(0, -radius + len);
                ctx.strokeStyle = isHour ? '#fff' : 'rgba(255,255,255,0.3)';
                ctx.lineWidth = isHour ? 3 * dpr : 1.5 * dpr;
                ctx.stroke();
                ctx.rotate(Math.PI / 30);
            }

            // Draw Hands
            const now = new Date(), hrs = now.getHours() % 12, mins = now.getMinutes(), secs = now.getSeconds();
            const drawHand = (ang, len, wid, col) => {
                ctx.save();
                ctx.rotate(ang);
                ctx.beginPath();
                ctx.strokeStyle = col;
                ctx.lineWidth = wid;
                ctx.lineCap = 'round';
                ctx.moveTo(0, 10 * dpr);
                ctx.lineTo(0, -len);
                ctx.stroke();
                ctx.restore();
            };

            drawHand((hrs * Math.PI / 6) + (mins * Math.PI / 360), radius * 0.5, 8 * dpr, '#fff');
            drawHand((mins * Math.PI / 30), radius * 0.8, 5 * dpr, '#fff');
            if (state.showSeconds) drawHand((secs * Math.PI / 30), radius * 0.9, 2 * dpr, '#ff3b30');

            ctx.beginPath(); ctx.arc(0, 0, 6 * dpr, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
            ctx.restore();
        }

        function updateClock() {
            if (state.clockStyle === 'digital') {
                const now = new Date();
                const s = state.showSeconds ? `<span style="font-size:0.5em; opacity:0.4">:${String(now.getSeconds()).padStart(2,'0')}</span>` : '';
                document.getElementById('clock-content').innerHTML = `
                    <div class="digital-time" style="font-family:${state.font}">${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}${s}</div>
                `;
            } else {
                drawAnalogue();
            }
        }

        // Wallpaper Logic
        document.getElementById('wp-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const maxW = 1280;
                    let w = img.width, h = img.height;
                    if (w > maxW) { h *= maxW/w; w = maxW; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    state.wallpaper = dataUrl;
                    document.getElementById('wallpaper-bg').style.backgroundImage = `url(${dataUrl})`;
                    persist();
                    document.getElementById('wp-status').textContent = "✓ Saved";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function updateState(key, val) {
            state[key] = val;
            persist();
            updateClock();
        }

        function init() {
            const saved = localStorage.getItem('standby_v23');
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed };
                // Ensure wallpaper applies on load
                if (state.wallpaper) {
                    setTimeout(() => {
                        document.getElementById('wallpaper-bg').style.backgroundImage = `url(${state.wallpaper})`;
                    }, 100);
                }
            }
            
            document.getElementById('settings-btn').onclick = () => document.getElementById('settings-modal').style.display='flex';
            
            applyGrid();
            setInterval(updateClock, 1000);
            updateClock();
            
            // Re-draw on resize
            window.addEventListener('resize', () => { applyGrid(); updateClock(); });
        }

        init();
    </script>
</body>
</html>
