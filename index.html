<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>iPad StandBy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ff3b30;
            --ios-blue: #0a84ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
        }

        #wallpaper-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -2; transition: background-image 0.5s ease-in-out;
        }

        #dark-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }

        #app-container {
            display: grid;
            width: 100vw; height: 100vh;
            padding: 24px; gap: 24px;
        }

        @media (orientation: landscape) {
            #app-container { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
            #clock-widget { grid-row: 1 / span 2; }
        }

        @media (orientation: portrait) {
            #app-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr 1fr; }
        }

        .widget {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        #clock-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .digital-time { font-size: 14vw; line-height: 0.9; text-align: center; }
        @media (orientation: portrait) { .digital-time { font-size: 20vw; } }

        #analogue-svg { width: 90%; height: 90%; max-width: 500px; max-height: 500px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
        .hand { transform-origin: 50px 50px; transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44); }
        .hand.second { transition: none; }

        #weather-icon { font-size: 5rem; margin-bottom: 10px; }
        #temp { font-size: 4rem; font-weight: 300; }
        #condition { font-size: 1.2rem; opacity: 0.8; letter-spacing: 1px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 90%; text-align: center; }
        .cal-header { font-size: 1.4rem; font-weight: 600; margin-bottom: 15px; }
        .day-label { font-size: 0.7rem; opacity: 0.5; margin-bottom: 5px; font-weight: 700; }
        .day { font-size: 1.1rem; padding: 6px; }
        .today { background: #fff; color: #000; border-radius: 50%; font-weight: 700; }

        #settings-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: white; padding: 12px; border-radius: 50%;
            cursor: pointer; z-index: 100; backdrop-filter: blur(10px); font-size: 1.5rem;
        }

        #settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #1c1c1e; width: 90%; max-width: 500px;
            max-height: 90vh; border-radius: 30px; padding: 30px;
            overflow-y: auto; border: 1px solid #38383a;
            position: relative;
        }

        .setting-section { margin-bottom: 30px; }
        .setting-section h3 { font-size: 0.8rem; color: #8e8e93; text-transform: uppercase; margin-bottom: 15px; }

        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .preview-card {
            background: #2c2c2e; border: 2px solid transparent;
            border-radius: 16px; padding: 15px; text-align: center; cursor: pointer;
            transition: all 0.2s;
        }
        .preview-card.active { border-color: var(--ios-blue); background: #3a3a3c; }

        .toggle-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid #38383a;
        }

        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #39393d; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(22px); }

        #apply-btn {
            width: 100%; padding: 18px; border-radius: 16px;
            background: var(--ios-blue); color: white; border: none;
            font-size: 1.1rem; font-weight: 600; cursor: pointer;
            margin-top: 10px; transition: opacity 0.2s;
        }
        #apply-btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="wallpaper-bg"></div>
    <div id="dark-overlay"></div>

    <div id="app-container">
        <div class="widget" id="clock-widget"><div id="clock-content"></div></div>
        <div class="widget" id="weather-widget">
            <div id="weather-icon">--</div>
            <div id="temp">--°</div>
            <div id="condition">Locating...</div>
        </div>
        <div class="widget" id="calendar-widget">
            <div class="cal-header" id="cal-title">Month</div>
            <div class="calendar-grid" id="cal-grid"></div>
        </div>
    </div>

    <button id="settings-btn">⚙️</button>

    <div id="settings-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; margin-bottom:25px;">Settings</h2>

            <div class="setting-section">
                <h3>Wallpaper</h3>
                <input type="file" id="wp-input" accept="image/*" style="width:100%; color:white;">
            </div>

            <div class="setting-section">
                <h3>Clock Style</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="clockStyle" data-val="digital">Digital</div>
                    <div class="preview-card" data-key="clockStyle" data-val="analogue">Analogue</div>
                </div>
            </div>

            <div class="setting-section" id="digital-fonts">
                <h3>Digital Font</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="font" data-val="Inter" style="font-family:'Inter'">Inter</div>
                    <div class="preview-card" data-key="font" data-val="Bebas Neue" style="font-family:'Bebas Neue'">Bebas</div>
                </div>
            </div>

            <div class="setting-section" id="analogue-faces" style="display:none">
                <h3>Analogue Face</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="face" data-val="minimal">Minimal</div>
                    <div class="preview-card" data-key="face" data-val="classic">Classic</div>
                </div>
            </div>

            <div class="setting-section">
                <h3>Display Options</h3>
                <div class="toggle-item"><span>Seconds</span><label class="switch"><input type="checkbox" id="check-seconds"><span class="slider"></span></label></div>
                <div class="toggle-item"><span>Date</span><label class="switch"><input type="checkbox" id="check-date"><span class="slider"></span></label></div>
                <div class="toggle-item"><span>Day</span><label class="switch"><input type="checkbox" id="check-day"><span class="slider"></span></label></div>
            </div>

            <button id="apply-btn">Apply Changes</button>
        </div>
    </div>

    <script>
        let state = {
            clockStyle: 'digital',
            font: 'Inter',
            face: 'minimal',
            showSeconds: true,
            showDate: true,
            showDay: true,
            wallpaper: null
        };

        function init() {
            const saved = localStorage.getItem('standby_v3');
            if (saved) {
                state = { ...state, ...JSON.parse(saved) };
            }
            
            if (state.wallpaper) {
                document.getElementById('wallpaper-bg').style.backgroundImage = `url(${state.wallpaper})`;
            }

            document.getElementById('check-seconds').checked = state.showSeconds;
            document.getElementById('check-date').checked = state.showDate;
            document.getElementById('check-day').checked = state.showDay;
            updateActiveCards();
            
            updateClock();
            setInterval(updateClock, 1000);
            updateCalendar();
            fetchWeather();
            setInterval(fetchWeather, 600000);
        }

        /** Apply & Save Function **/
        function applyAndClose() {
            // Persist to storage
            localStorage.setItem('standby_v3', JSON.stringify(state));
            
            // Visual feedback on button
            const btn = document.getElementById('apply-btn');
            const originalText = btn.textContent;
            btn.textContent = "Applied!";
            btn.style.background = "#34c759"; // Success green

            setTimeout(() => {
                document.getElementById('settings-modal').style.display = 'none';
                btn.textContent = originalText;
                btn.style.background = "var(--ios-blue)";
            }, 600);
        }

        function updateClock() {
            const now = new Date();
            const container = document.getElementById('clock-content');
            if (state.clockStyle === 'digital') renderDigital(now, container);
            else renderAnalogue(now, container);
        }

        function renderDigital(now, container) {
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            let html = `<div class="digital-time" style="font-family:'${state.font}'">${h}:${m}${state.showSeconds ? `<span style="font-size:0.5em; opacity:0.4">:${s}</span>` : ''}</div>`;
            if (state.showDate || state.showDay) {
                html += `<div style="font-size:1.5rem; margin-top:10px; opacity:0.8">`;
                if (state.showDay) html += now.toLocaleDateString('en-US', {weekday:'long'}) + ' ';
                if (state.showDate) html += now.toLocaleDateString('en-US', {month:'long', day:'numeric'});
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function renderAnalogue(now, container) {
            const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours() % 12;
            const sDeg = s * 6, mDeg = m * 6 + s * 0.1, hDeg = h * 30 + m * 0.5;
            let face = '';
            if (state.face === 'classic') {
                for (let i = 1; i <= 12; i++) {
                    const ang = (i * 30 - 90) * (Math.PI / 180);
                    face += `<text x="${50 + 38 * Math.cos(ang)}" y="${50 + 38 * Math.sin(ang)}" fill="white" font-size="5" text-anchor="middle" dominant-baseline="central" font-weight="600">${i}</text>`;
                }
            } else { face += `<circle cx="50" cy="50" r="1.5" fill="white"/>`; }

            container.innerHTML = `
                <svg id="analogue-svg" viewBox="0 0 100 100">
                    ${face}
                    <line x1="50" y1="50" x2="50" y2="30" stroke="white" stroke-width="4" stroke-linecap="round" class="hand" transform="rotate(${hDeg} 50 50)" />
                    <line x1="50" y1="50" x2="50" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round" class="hand" transform="rotate(${mDeg} 50 50)" />
                    ${state.showSeconds ? `<line x1="50" y1="50" x2="50" y2="10" stroke="var(--accent-color)" stroke-width="1" stroke-linecap="round" class="hand second" transform="rotate(${sDeg} 50 50)" />` : ''}
                </svg>
                <div style="margin-top:10px; font-size:1.2rem; opacity:0.8">
                    ${state.showDay ? now.toLocaleDateString('en-US', {weekday:'short'}) : ''} ${state.showDate ? now.toLocaleDateString('en-US', {month:'short', day:'numeric'}) : ''}
                </div>`;
        }

        document.getElementById('wp-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 1920) { h *= 1920/w; w = 1920; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    state.wallpaper = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('wallpaper-bg').style.backgroundImage = `url(${state.wallpaper})`;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function fetchWeather() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
                    const data = await res.json();
                    const cur = data.current_weather;
                    document.getElementById('temp').textContent = Math.round(cur.temperature) + '°';
                    document.getElementById('weather-icon').textContent = cur.weathercode > 3 ? '☁️' : '☀️';
                    document.getElementById('condition').textContent = "Live Update";
                } catch (err) {}
            });
        }

        function updateCalendar() {
            const now = new Date();
            document.getElementById('cal-title').textContent = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="day-label">${d}</div>`);
            for (let i = 0; i < first; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= days; d++) grid.innerHTML += `<div class="day ${d === now.getDate() ? 'today' : ''}">${d}</div>`;
        }

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('apply-btn').onclick = applyAndClose;

        document.querySelectorAll('.preview-card').forEach(card => {
            card.onclick = () => {
                state[card.dataset.key] = card.dataset.val;
                updateActiveCards();
                updateClock();
            };
        });

        ['check-seconds', 'check-date', 'check-day'].forEach(id => {
            document.getElementById(id).onchange = (e) => {
                const key = id.replace('check-', '');
                state[`show${key.charAt(0).toUpperCase() + key.slice(1)}`] = e.target.checked;
                updateClock();
            };
        });

        function updateActiveCards() {
            document.querySelectorAll('.preview-card').forEach(card => {
                card.classList.toggle('active', state[card.dataset.key] === card.dataset.val);
            });
            document.getElementById('digital-fonts').style.display = state.clockStyle === 'digital' ? 'block' : 'none';
            document.getElementById('analogue-faces').style.display = state.clockStyle === 'analogue' ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
