<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPad StandBy Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ff3b30;
            --ios-blue: #0a84ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Inter', sans-serif; color: var(--text-color);
        }

        #wallpaper-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -2; transition: background-image 0.5s ease-in-out;
        }

        #dark-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }

        #widgets-container { position: relative; width: 100vw; height: 100vh; }

        .widget {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-width: 180px; min-height: 180px;
            touch-action: none; /* Only disable browser touch on widgets */
        }

        .drag-handle {
            position: absolute; top: 12px; left: 12px; width: 34px; height: 34px;
            background: rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            opacity: 0; transition: opacity 0.3s; cursor: move; z-index: 10;
        }
        .resize-handle {
            position: absolute; bottom: 12px; right: 12px; width: 24px; height: 24px;
            border-right: 3px solid white; border-bottom: 3px solid white;
            opacity: 0; transition: opacity 0.3s; cursor: nwse-resize; z-index: 10;
        }
        .widget:hover .drag-handle, .widget:hover .resize-handle { opacity: 0.6; }

        #clock-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .digital-time { font-size: 5.5rem; line-height: 1; text-align: center; }

        #analogue-svg { width: 90%; height: 90%; max-width: 500px; max-height: 500px; }
        .hand { transform-origin: 50px 50px; transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44); }
        .hand.second { transition: none; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; text-align: center; font-size: 0.85rem; }
        .today { background: #fff; color: #000; border-radius: 50%; font-weight: bold; }

        #settings-btn {
            position: fixed; bottom: 25px; right: 25px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: white; padding: 14px; border-radius: 50%;
            z-index: 100; font-size: 1.6rem;
        }

        #settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #1c1c1e; width: 90%; max-width: 500px;
            max-height: 85vh; border-radius: 30px; padding: 30px;
            overflow-y: auto; border: 1px solid #38383a;
            touch-action: pan-y; /* Allow scrolling in modal */
        }

        .setting-section { margin-bottom: 25px; }
        .setting-section h3 { font-size: 0.75rem; color: #8e8e93; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .preview-card {
            background: #2c2c2e; border: 2px solid transparent;
            border-radius: 14px; padding: 14px; text-align: center; font-size: 0.85rem;
        }
        .preview-card.active { border-color: var(--ios-blue); background: #3a3a3c; }

        .toggle-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #38383a; }
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #39393d; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(22px); }

        #apply-btn { width: 100%; padding: 18px; border-radius: 16px; background: var(--ios-blue); color: white; border: none; font-weight: 600; font-size: 1rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="wallpaper-bg"></div>
    <div id="dark-overlay"></div>

    <div id="widgets-container">
        <!-- Pixel-based positioning initialized in JS -->
        <div class="widget" id="clock-widget">
            <div class="drag-handle">⠿</div>
            <div id="clock-content"></div>
            <div class="resize-handle"></div>
        </div>

        <div class="widget" id="weather-widget">
            <div class="drag-handle">⠿</div>
            <div id="weather-icon" style="font-size:3.5rem">--</div>
            <div id="temp" style="font-size:3rem">--°</div>
            <div id="condition" style="opacity:0.7; font-weight: 300;">Locating...</div>
            <div class="resize-handle"></div>
        </div>

        <div class="widget" id="calendar-widget">
            <div class="drag-handle">⠿</div>
            <div id="cal-title" style="font-weight:600; margin-bottom:12px; font-size: 1.2rem;">Month</div>
            <div id="cal-grid" class="calendar-grid"></div>
            <div class="resize-handle"></div>
        </div>
    </div>

    <button id="settings-btn">⚙️</button>

    <div id="settings-modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Settings</h2>

            <div class="setting-section">
                <h3>Wallpaper</h3>
                <input type="file" id="wp-input" accept="image/*" style="width:100%; color:white;">
            </div>

            <div class="setting-section">
                <h3>Clock Style</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="clockStyle" data-val="digital">Digital</div>
                    <div class="preview-card" data-key="clockStyle" data-val="analogue">Analogue</div>
                </div>
            </div>

            <div class="setting-section" id="digital-fonts">
                <h3>Digital Font</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="font" data-val="Inter" style="font-family:'Inter'">Inter</div>
                    <div class="preview-card" data-key="font" data-val="Bebas Neue" style="font-family:'Bebas Neue'">Bebas</div>
                </div>
            </div>

            <div class="setting-section" id="analogue-faces" style="display:none">
                <h3>Analogue Face</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="face" data-val="minimal">Minimal</div>
                    <div class="preview-card" data-key="face" data-val="classic">Classic</div>
                    <div class="preview-card" data-key="face" data-val="outlined">Outlined</div>
                </div>
            </div>

            <div class="setting-section">
                <h3>Display Options</h3>
                <div class="toggle-item"><span>Show Seconds</span><label class="switch"><input type="checkbox" id="check-seconds"><span class="slider"></span></label></div>
                <div class="toggle-item"><span>Show Date</span><label class="switch"><input type="checkbox" id="check-date"><span class="slider"></span></label></div>
                <div class="toggle-item"><span>Show Day</span><label class="switch"><input type="checkbox" id="check-day"><span class="slider"></span></label></div>
            </div>

            <button id="apply-btn">Apply & Save Layout</button>
        </div>
    </div>

    <script>
        let state = {
            clockStyle: 'digital', font: 'Inter', face: 'minimal',
            showSeconds: true, showDate: true, showDay: true, wallpaper: null,
            layouts: {} 
        };

        const weatherMap = {
            0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
            45: "Foggy", 48: "Dense Fog", 51: "Light Drizzle", 61: "Rainy",
            71: "Snowy", 81: "Showers", 95: "Thunderstorm"
        };

        function init() {
            const saved = localStorage.getItem('standby_v5');
            if (saved) state = { ...state, ...JSON.parse(saved) };

            if (state.wallpaper) document.getElementById('wallpaper-bg').style.backgroundImage = `url(${state.wallpaper})`;
            
            // Normalize Layout to Pixels
            const defaultPositions = {
                'clock-widget': { top: 0.1, left: 0.05, w: 0.45, h: 0.6 },
                'weather-widget': { top: 0.1, left: 0.55, w: 0.4, h: 0.3 },
                'calendar-widget': { top: 0.45, left: 0.55, w: 0.4, h: 0.45 }
            };

            Object.keys(defaultPositions).forEach(id => {
                const el = document.getElementById(id);
                if (state.layouts[id]) {
                    const l = state.layouts[id];
                    el.style.top = l.top + 'px';
                    el.style.left = l.left + 'px';
                    el.style.width = l.width + 'px';
                    el.style.height = l.height + 'px';
                } else {
                    const d = defaultPositions[id];
                    el.style.top = (window.innerHeight * d.top) + 'px';
                    el.style.left = (window.innerWidth * d.left) + 'px';
                    el.style.width = (window.innerWidth * d.w) + 'px';
                    el.style.height = (window.innerHeight * d.h) + 'px';
                }
            });

            document.getElementById('check-seconds').checked = state.showSeconds;
            document.getElementById('check-date').checked = state.showDate;
            document.getElementById('check-day').checked = state.showDay;
            
            updateActiveCards();
            updateClock();
            setInterval(updateClock, 1000);
            updateCalendar();
            fetchWeather();
            setupInteractions();
            initWakeLock();
        }

        /** PIXEL-BASED CLAMPED INTERACTIONS **/
        function setupInteractions() {
            const widgets = document.querySelectorAll('.widget');
            widgets.forEach(w => {
                const drag = w.querySelector('.drag-handle');
                const resize = w.querySelector('.resize-handle');
                
                let activeAction = null;
                let startX, startY, startTop, startLeft, startW, startH;

                const onStart = (e) => {
                    const touch = e.type.includes('touch') ? e.touches[0] : e;
                    if (e.target === drag) activeAction = 'drag';
                    else if (e.target === resize) activeAction = 'resize';
                    else return;

                    startX = touch.clientX; startY = touch.clientY;
                    startTop = parseInt(w.style.top);
                    startLeft = parseInt(w.style.left);
                    startW = w.offsetWidth;
                    startH = w.offsetHeight;
                    w.style.zIndex = 50;
                };

                const onMove = (e) => {
                    if (!activeAction) return;
                    const touch = e.type.includes('touch') ? e.touches[0] : e;
                    const dx = touch.clientX - startX;
                    const dy = touch.clientY - startY;

                    if (activeAction === 'drag') {
                        let newTop = startTop + dy;
                        let newLeft = startLeft + dx;
                        
                        // Boundary Clamping
                        newTop = Math.max(0, Math.min(newTop, window.innerHeight - w.offsetHeight));
                        newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - w.offsetWidth));
                        
                        w.style.top = newTop + 'px';
                        w.style.left = newLeft + 'px';
                    } else {
                        let newW = startW + dx;
                        let newH = startH + dy;

                        // Clamping for Resize
                        newW = Math.max(180, Math.min(newW, window.innerWidth - startLeft));
                        newH = Math.max(180, Math.min(newH, window.innerHeight - startTop));

                        w.style.width = newW + 'px';
                        w.style.height = newH + 'px';
                    }
                };

                const onEnd = () => {
                    if (!activeAction) return;
                    state.layouts[w.id] = { 
                        top: parseInt(w.style.top), 
                        left: parseInt(w.style.left), 
                        width: parseInt(w.style.width), 
                        height: parseInt(w.style.height) 
                    };
                    activeAction = null; w.style.zIndex = 10;
                };

                w.addEventListener('mousedown', onStart);
                w.addEventListener('touchstart', onStart);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('touchmove', onMove, { passive: false });
                window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchend', onEnd);
            });
        }

        /** ENHANCED ANALOGUE RENDERING **/
        function renderAnalogue(now, container) {
            const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours() % 12;
            const sDeg = s * 6, mDeg = m * 6 + s * 0.1, hDeg = h * 30 + m * 0.5;
            let face = '';
            
            if (state.face === 'classic') {
                for (let i = 1; i <= 12; i++) {
                    const ang = (i * 30 - 90) * (Math.PI / 180);
                    face += `<text x="${50 + 38 * Math.cos(ang)}" y="${50 + 38 * Math.sin(ang)}" fill="white" font-size="6" text-anchor="middle" dominant-baseline="central" font-weight="600">${i}</text>`;
                }
            } else if (state.face === 'outlined') {
                face += `<circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="0.8" opacity="0.6" />`;
                // Add 12 ticks
                for (let i = 0; i < 12; i++) {
                    face += `<line x1="50" y1="4" x2="50" y2="9" stroke="white" stroke-width="1" transform="rotate(${i * 30} 50 50)" opacity="0.8" />`;
                }
            } else { 
                face += `<circle cx="50" cy="50" r="2" fill="white"/>`; 
            }

            container.innerHTML = `
                <svg id="analogue-svg" viewBox="0 0 100 100">
                    ${face}
                    <line x1="50" y1="50" x2="50" y2="30" stroke="white" stroke-width="4" stroke-linecap="round" class="hand" transform="rotate(${hDeg} 50 50)" />
                    <line x1="50" y1="50" x2="50" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round" class="hand" transform="rotate(${mDeg} 50 50)" />
                    ${state.showSeconds ? `<line x1="50" y1="50" x2="50" y2="10" stroke="${state.face==='outlined'?'white':'#ff3b30'}" stroke-width="1.2" class="hand second" transform="rotate(${sDeg} 50 50)" />` : ''}
                </svg>`;
        }

        /** WEATHER & CLOCK CORE **/
        async function fetchWeather() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
                    const data = await res.json();
                    const cur = data.current_weather;
                    document.getElementById('temp').textContent = Math.round(cur.temperature) + '°';
                    document.getElementById('condition').textContent = weatherMap[cur.weathercode] || "Clear";
                    document.getElementById('weather-icon').textContent = cur.weathercode > 3 ? (cur.weathercode > 70 ? '❄️' : '🌧️') : '☀️';
                } catch (err) {}
            }, () => { document.getElementById('condition').textContent = "Loc. Access Denied"; });
        }

        function updateClock() {
            const now = new Date();
            const container = document.getElementById('clock-content');
            if (state.clockStyle === 'digital') {
                const s = state.showSeconds ? `<span style="font-size:0.5em; opacity:0.4">:${String(now.getSeconds()).padStart(2,'0')}</span>` : '';
                container.innerHTML = `<div class="digital-time" style="font-family:'${state.font}'">${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}${s}</div>`;
                if (state.showDate || state.showDay) {
                    container.innerHTML += `<div style="font-size:1.4rem; opacity:0.8; margin-top:8px; font-weight:300;">${state.showDay ? now.toLocaleDateString('en-US',{weekday:'long'}) : ''}${state.showDay && state.showDate ? ', ':''}${state.showDate ? now.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''}</div>`;
                }
            } else renderAnalogue(now, container);
        }

        function updateCalendar() {
            const now = new Date();
            document.getElementById('cal-title').textContent = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div style="opacity:0.4; font-weight:bold;">${d}</div>`);
            for (let i = 0; i < first; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= days; d++) grid.innerHTML += `<div class="${d === now.getDate() ? 'today' : ''}">${d}</div>`;
        }

        // Wake Lock
        async function initWakeLock() {
            try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        // Settings
        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('apply-btn').onclick = () => {
            localStorage.setItem('standby_v5', JSON.stringify(state));
            document.getElementById('settings-modal').style.display = 'none';
        };

        document.querySelectorAll('.preview-card').forEach(card => {
            card.onclick = () => {
                state[card.dataset.key] = card.dataset.val;
                updateActiveCards();
                updateClock();
            };
        });

        ['seconds', 'date', 'day'].forEach(key => {
            document.getElementById(`check-${key}`).onchange = (e) => { 
                const stateKey = `show${key.charAt(0).toUpperCase() + key.slice(1)}`;
                state[stateKey] = e.target.checked; 
                updateClock(); 
            };
        });

        document.getElementById('wp-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 1920) { h *= 1920/w; w = 1920; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    state.wallpaper = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('wallpaper-bg').style.backgroundImage = `url(${state.wallpaper})`;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function updateActiveCards() {
            document.querySelectorAll('.preview-card').forEach(card => {
                card.classList.toggle('active', state[card.dataset.key] === card.dataset.val);
            });
            document.getElementById('digital-fonts').style.display = state.clockStyle === 'digital' ? 'block' : 'none';
            document.getElementById('analogue-faces').style.display = state.clockStyle === 'analogue' ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
