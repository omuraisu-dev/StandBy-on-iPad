<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>iPad StandBy Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ff3b30;
            --ios-blue: #0a84ff;
            --padding-edge: 24px;
            --gap: 12px;
            --font-clamp-normal: clamp(3rem, 10vw, 9rem);
            --font-clamp-reduced: clamp(2rem, 6vw, 5rem);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: #fff; }

        #wallpaper-bg { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: -2; transition: background-image 0.5s; }
        #dark-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: -1; }

        #app-container {
            display: grid; width: 100vw; height: 100vh;
            padding: var(--padding-edge);
        }

        @media (orientation: landscape) {
            #clock-widget { grid-column: 1; grid-row: 1 / span 3; }
            #div-v { grid-column: 2; grid-row: 1 / span 3; display: flex; }
            #weather-widget { grid-column: 3; grid-row: 1; }
            #div-h-land { grid-column: 3; grid-row: 2; display: flex; }
            #calendar-widget { grid-column: 3; grid-row: 3; }
            #div-h-port-1, #div-h-port-2 { display: none; }
        }

        @media (orientation: portrait) {
            #clock-widget { grid-row: 1; }
            #div-h-port-1 { grid-row: 2; display: flex; }
            #weather-widget { grid-row: 3; }
            #div-h-port-2 { grid-row: 4; display: flex; }
            #calendar-widget { grid-row: 5; }
            #div-v, #div-h-land { display: none; }
        }

        .divider { align-items: center; justify-content: center; background: transparent; position: relative; z-index: 10; }
        .divider::after { content: ''; background: rgba(255,255,255,0.2); border-radius: 10px; transition: all 0.2s; }
        .divider:hover::after, .divider.dragging::after { background: var(--ios-blue); box-shadow: 0 0 10px var(--ios-blue); }
        .divider.v { cursor: col-resize; width: var(--gap); }
        .divider.v::after { width: 4px; height: 40px; }
        .divider.h { cursor: row-resize; height: var(--gap); }
        .divider.h::after { width: 40px; height: 4px; }

        .widget {
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 32px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden;
        }

        #clock-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .digital-time { line-height: 1; text-align: center; font-variant-numeric: tabular-nums; font-size: var(--font-clamp-normal); }
        
        #clock-widget.h-lt-200 .date-info { display: none !important; }
        #clock-widget.h-lt-200 .digital-time, #clock-widget.w-lt-250 .digital-time { font-size: var(--font-clamp-reduced) !important; }
        #clock-widget.w-lt-250 .digital-seconds { display: none !important; }
        #clock-widget.gt-400 .date-info { margin-top: 24px; font-weight: 400; opacity: 1; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 95%; text-align: center; font-size: 0.9rem; }
        .day-cell { display: flex; align-items: center; justify-content: center; height: 36px; }
        .day-header { height: 24px; opacity: 0.4; font-weight: bold; font-size: 0.75rem; }
        .today-circle { background: #fff; color: #000; width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }

        #settings-btn { position: fixed; bottom: 25px; right: 25px; background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 14px; border-radius: 50%; font-size: 1.6rem; z-index: 1000; cursor: pointer; }
        #settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1001; backdrop-filter: blur(15px); }
        .modal-content { background: #1c1c1e; width: 90%; max-width: 500px; max-height: 85vh; border-radius: 30px; padding: 30px; overflow-y: auto; border: 1px solid #38383a; position: relative; }
        .modal-close-x { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #8e8e93; font-size: 1.8rem; cursor: pointer; }
        .toggle-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #38383a; }
        .switch { position: relative; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle { position: absolute; inset: 0; background-color: #39393d; border-radius: 34px; cursor: pointer; transition: .3s; }
        .slider-toggle:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
        input:checked + .slider-toggle { background-color: #34c759; }
        input:checked + .slider-toggle:before { transform: translateX(22px); }
        #wp-status { display: block; margin-top: 8px; font-size: 0.85rem; height: 1.2rem; }
        #apply-btn { width: 100%; padding: 18px; border-radius: 16px; background: #0a84ff; color: #fff; border: none; font-weight: 600; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="wallpaper-bg"></div>
    <div id="dark-overlay"></div>

    <div id="app-container">
        <div class="widget" id="clock-widget"><div id="clock-content"></div></div>
        <div id="div-v" class="divider v"></div>
        <div id="div-h-port-1" class="divider h"></div>
        <div class="widget" id="weather-widget">
            <div id="weather-icon">--</div>
            <div id="temp">--°</div>
            <div id="condition">Locating...</div>
            <div id="location">📍 Detect Location...</div>
        </div>
        <div id="div-h-land" class="divider h"></div>
        <div id="div-h-port-2" class="divider h"></div>
        <div class="widget" id="calendar-widget">
            <div id="cal-title" style="font-weight:600; margin-bottom:8px; font-size: 1.1rem;">Month</div>
            <div id="cal-grid" class="calendar-grid"></div>
        </div>
    </div>

    <button id="settings-btn">⚙️</button>

    <div id="settings-modal">
        <div class="modal-content">
            <button class="modal-close-x" id="modal-cancel">&times;</button>
            <h2 style="margin-top:0">Settings</h2>
            <div class="setting-section">
                <h3>Wallpaper</h3>
                <input type="file" id="wp-input" accept="image/*" style="width:100%; color:white;">
                <span id="wp-status"></span>
            </div>
            <div class="setting-section">
                <h3>Clock Style</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="clockStyle" data-val="digital">Digital</div>
                    <div class="preview-card" data-key="clockStyle" data-val="analogue">Analogue</div>
                </div>
            </div>
            <div id="digital-options">
                <div class="setting-section">
                    <h3>Digital Font</h3>
                    <div class="preview-grid">
                        <div class="preview-card" data-key="font" data-val="Inter" style="font-family:'Inter'">Inter</div>
                        <div class="preview-card" data-key="font" data-val="Bebas Neue" style="font-family:'Bebas Neue'">Bebas</div>
                    </div>
                </div>
                <div class="setting-section">
                    <h3>Clock Size</h3>
                    <div style="padding:10px 0;">
                        <input type="range" id="clock-size-slider" min="0" max="4" step="1" value="2" style="width:100%;">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#8e8e93; margin-top:8px;">
                            <span>XS</span><span>S</span><span>M</span><span>L</span><span>XL</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="setting-section" id="analogue-faces" style="display:none">
                <h3>Analogue Face</h3>
                <div class="preview-grid">
                    <div class="preview-card" data-key="face" data-val="minimal">Minimal</div>
                    <div class="preview-card" data-key="face" data-val="classic">Classic</div>
                    <div class="preview-card" data-key="face" data-val="outlined">Outlined</div>
                </div>
            </div>
            <div class="setting-section">
                <h3>Display</h3>
                <div class="toggle-item"><span>Seconds</span><label class="switch"><input type="checkbox" id="check-seconds"><span class="slider-toggle"></span></label></div>
                <div class="toggle-item"><span>Date</span><label class="switch"><input type="checkbox" id="check-date"><span class="slider-toggle"></span></label></div>
                <div class="toggle-item"><span>Day</span><label class="switch"><input type="checkbox" id="check-day"><span class="slider-toggle"></span></label></div>
            </div>
            <button id="apply-btn">Apply Changes</button>
        </div>
    </div>

    <script>
        const sizes = ['xs', 'small', 'medium', 'large', 'xl'];
        let state = {
            clockStyle: 'digital', font: 'Inter', face: 'minimal', clockSize: 'medium',
            showSeconds: true, showDate: true, showDay: true, wallpaper: null,
            gridL: { c: 1, r: 1 }, gridP: { r1: 1, r2: 1, r3: 1 }
        };

        const weatherIconMap = {
            0:'☀️', 1:'🌤️', 2:'🌤️', 3:'🌤️', 45:'🌫️', 48:'🌫️',
            51:'🌦️', 53:'🌦️', 55:'🌦️', 56:'🌦️', 57:'🌦️', 61:'🌦️', 63:'🌦️', 65:'🌦️', 66:'🌦️', 67:'🌦️',
            71:'❄️', 73:'❄️', 75:'❄️', 77:'❄️', 80:'🌧️', 81:'🌧️', 82:'🌧️', 95:'⛈️', 96:'⛈️', 99:'⛈️'
        };
        const weatherTexts = { 0:"Clear Sky",1:"Mainly Clear",2:"Partly Cloudy",3:"Overcast",45:"Foggy",48:"Dense Fog",51:"Drizzle",61:"Rainy",71:"Snowy",81:"Showers",95:"Stormy" };
        const fontClamps = {
            xs:     { l: 'clamp(1.5rem, 4vw, 3.5rem)', p: 'clamp(2rem, 8vw, 5rem)' },
            small:  { l: 'clamp(2rem, 6vw, 5rem)',     p: 'clamp(3rem, 12vw, 8rem)' },
            medium: { l: 'clamp(3rem, 10vw, 9rem)',    p: 'clamp(4rem, 18vw, 12rem)' },
            large:  { l: 'clamp(4rem, 14vw, 13rem)',   p: 'clamp(6rem, 24vw, 16rem)' },
            xl:     { l: 'clamp(5rem, 18vw, 16rem)',   p: 'clamp(7rem, 28vw, 20rem)' }
        };

        function debounce(func, wait) {
            let timeout; return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); };
        }

        function applyGrid() {
            const container = document.getElementById('app-container');
            const isLand = window.matchMedia("(orientation: landscape)").matches;
            if (isLand) {
                container.style.gridTemplateColumns = `${state.gridL.c}fr 12px 1fr`;
                container.style.gridTemplateRows = `${state.gridL.r}fr 12px 1fr`;
            } else {
                container.style.gridTemplateColumns = `1fr`;
                container.style.gridTemplateRows = `${state.gridP.r1}fr 12px ${state.gridP.r2}fr 12px ${state.gridP.r3}fr`;
            }
        }

        let wakeLock = null;
        async function getWakeLock() {
            if ('wakeLock' in navigator) {
                try { if (wakeLock) await wakeLock.release(); wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
            }
        }
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') getWakeLock(); });

        let clockCanvas, ctx;
        function drawAnalogue() {
            if (state.clockStyle !== 'analogue') return;
            const content = document.getElementById('clock-content');
            if (!clockCanvas) { clockCanvas = document.createElement('canvas'); ctx = clockCanvas.getContext('2d'); }
            if (!content.contains(clockCanvas)) { content.innerHTML = ''; content.appendChild(clockCanvas); }
            const rect = content.getBoundingClientRect();
            const dpr = window.devicePixelRatio;
            clockCanvas.width = rect.width * dpr; clockCanvas.height = rect.height * dpr;
            const radius = (Math.min(clockCanvas.width, clockCanvas.height) / 2) * 0.82;
            ctx.clearRect(0, 0, clockCanvas.width, clockCanvas.height); ctx.save(); ctx.translate(clockCanvas.width / 2, clockCanvas.height / 2); ctx.lineCap = 'round';
            ctx.save();
            if (state.face === 'outlined') {
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2 * dpr; ctx.stroke();
                for (let i = 0; i < 12; i++) { ctx.rotate(Math.PI / 6); ctx.beginPath(); ctx.moveTo(0, -radius + (12 * dpr)); ctx.lineTo(0, -radius + (2 * dpr)); ctx.stroke(); }
            } else if (state.face === 'classic') {
                ctx.fillStyle = '#fff'; ctx.font = `bold ${radius * 0.18}px Inter`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                for (let i = 1; i <= 12; i++) { const ang = i * Math.PI / 6; ctx.fillText(i.toString(), radius * 0.82 * Math.sin(ang), -radius * 0.82 * Math.cos(ang)); }
                for (let i = 0; i < 60; i++) { ctx.rotate(Math.PI / 30); ctx.beginPath(); ctx.moveTo(0, -radius); ctx.lineTo(0, -radius + (i % 5 === 0 ? 12 : 5) * dpr); ctx.strokeStyle = i % 5 === 0 ? '#fff' : 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5 * dpr; ctx.stroke(); }
            }
            ctx.restore();
            const now = new Date(), hrs = now.getHours() % 12, mins = now.getMinutes(), secs = now.getSeconds();
            const hL = radius * 0.5, mL = radius * 0.8, sL = radius * 0.9;
            const dh = (ang, len, wid, col) => { ctx.save(); ctx.rotate(ang); ctx.beginPath(); ctx.strokeStyle = col; ctx.lineWidth = wid; ctx.moveTo(0, len * 0.18); ctx.lineTo(0, -len); ctx.stroke(); ctx.restore(); };
            dh((hrs * Math.PI / 6) + (mins * Math.PI / 360), hL, 7 * dpr, '#fff');
            dh((mins * Math.PI / 30) + (secs * Math.PI / 1800), mL, 4.5 * dpr, '#fff');
            if (state.showSeconds) dh(secs * Math.PI / 30, sL, 2 * dpr, state.face === 'outlined' ? '#fff' : '#ff3b30');
            ctx.beginPath(); ctx.arc(0, 0, 5 * dpr, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill(); ctx.restore();
        }

        function updateClock() {
            const isLand = window.matchMedia("(orientation: landscape)").matches;
            const root = document.documentElement;
            root.style.setProperty('--font-clamp-normal', isLand ? fontClamps[state.clockSize].l : fontClamps[state.clockSize].p);
            const reducedIdx = Math.max(0, sizes.indexOf(state.clockSize) - 1);
            root.style.setProperty('--font-clamp-reduced', isLand ? fontClamps[sizes[reducedIdx]].l : fontClamps[sizes[reducedIdx]].p);
            const now = new Date(), container = document.getElementById('clock-content');
            if (state.clockStyle === 'digital') {
                const s = state.showSeconds ? `<span class="digital-seconds" style="font-size:0.5em; opacity:0.4">:${String(now.getSeconds()).padStart(2,'0')}</span>` : '';
                container.innerHTML = `<div class="digital-time" style="font-family:'${state.font}'">${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}${s}</div>` +
                ((state.showDate || state.showDay) ? `<div class="date-info" style="font-size:1.4rem; opacity:0.8; margin-top:8px; font-weight:300;">${state.showDay ? now.toLocaleDateString('en-US',{weekday:'long'}) : ''}${state.showDay && state.showDate ? ', ':''}${state.showDate ? now.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''}</div>` : '');
            } else { drawAnalogue(); }
        }

        function updateWeatherScaling(el, w, h) {
            const scale = Math.min(w / 350, h / 280);
            const icon = el.querySelector('#weather-icon'), temp = el.querySelector('#temp'), cond = el.querySelector('#condition'), loc = el.querySelector('#location');
            icon.style.fontSize = `clamp(1.5rem, ${4.5 * scale}rem, 8rem)`;
            icon.style.marginBottom = `clamp(2px, ${8 * scale}px, 16px)`;
            temp.style.fontSize = `clamp(1.2rem, ${3.5 * scale}rem, 7rem)`;
            cond.style.fontSize = `clamp(0.6rem, ${1.2 * scale}rem, 2rem)`;
            cond.style.marginBottom = `clamp(2px, ${8 * scale}px, 16px)`;
            loc.style.fontSize = `clamp(0.5rem, ${0.85 * scale}rem, 1.4rem)`;
            loc.style.display = scale < 0.5 ? 'none' : 'block';
            cond.style.display = scale < 0.35 ? 'none' : 'block';
        }

        function initResizeObservers() {
            const observer = new ResizeObserver(debounce((entries) => {
                for (let entry of entries) {
                    const { width: w, height: h } = entry.contentRect, el = entry.target;
                    if (el.id === 'weather-widget') updateWeatherScaling(el, w, h);
                    else if (el.id === 'clock-widget') {
                        el.classList.toggle('h-lt-200', h < 200); el.classList.toggle('w-lt-250', w < 250);
                        el.classList.toggle('gt-400', h > 400 && w > 400);
                        if (state.clockStyle === 'analogue') drawAnalogue();
                    } else if (el.id === 'calendar-widget') {
                        el.classList.toggle('h-lt-220', h < 220); el.classList.toggle('h-lt-150', h < 150);
                        el.classList.toggle('w-gt-400', w > 400); el.classList.toggle('w-lt-280', w < 280);
                    }
                }
            }, 50));
            document.querySelectorAll('.widget').forEach(w => observer.observe(w));
        }

        function initGridInteraction() {
            const container = document.getElementById('app-container'), minPx = 150;
            const handleDrag = (divider, type) => {
                const onMove = (e) => {
                    const t = e.touches ? e.touches[0] : e, rect = container.getBoundingClientRect(), pad = 24, gap = 12;
                    if (type === 'v') state.gridL.c = Math.max(minPx, Math.min(rect.width - minPx, t.clientX - rect.left - pad)) / (rect.width - pad * 2 - gap - Math.max(minPx, Math.min(rect.width - minPx, t.clientX - rect.left - pad)));
                    else if (type === 'h-land') state.gridL.r = Math.max(minPx, Math.min(rect.height - minPx, t.clientY - rect.top - pad)) / (rect.height - pad * 2 - gap - Math.max(minPx, Math.min(rect.height - minPx, t.clientY - rect.top - pad)));
                    else if (type === 'h-p1' || type === 'h-p2') {
                        const h = rect.height - pad * 2 - gap * 2, y = t.clientY - rect.top - pad;
                        if (type === 'h-p1') {
                            const r1 = Math.max(minPx, Math.min(h - minPx * 2, y));
                            state.gridP.r1 = r1 / (h/3); state.gridP.r2 = ((h - r1) / 2) / (h/3); state.gridP.r3 = state.gridP.r2;
                        } else {
                            const r1Px = state.gridP.r1 * (h/3), r2 = Math.max(minPx, Math.min(h - r1Px - minPx, y - r1Px - gap));
                            state.gridP.r2 = r2 / (h/3); state.gridP.r3 = (h - r1Px - r2) / (h/3);
                        }
                    }
                    applyGrid();
                };
                const onEnd = () => {
                    divider.classList.remove('dragging');
                    window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onEnd);
                    window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onEnd);
                    localStorage.setItem('standby_v20', JSON.stringify(state));
                };
                divider.onmousedown = divider.ontouchstart = (e) => {
                    e.preventDefault(); divider.classList.add('dragging');
                    window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
                    window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onEnd);
                };
            };
            handleDrag(document.getElementById('div-v'), 'v'); handleDrag(document.getElementById('div-h-land'), 'h-land');
            handleDrag(document.getElementById('div-h-port-1'), 'h-p1'); handleDrag(document.getElementById('div-h-port-2'), 'h-p2');
        }

        async function fetchWeather() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const d = await res.json(), code = d.current_weather.weathercode;
                    document.getElementById('temp').textContent = Math.round(d.current_weather.temperature) + '°';
                    document.getElementById('condition').textContent = weatherTexts[code] || "Clear Sky";
                    document.getElementById('weather-icon').textContent = weatherIconMap[code] || '☀️';
                    const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&email=standby@app.local`);
                    const g = await geo.json();
                    document.getElementById('location').textContent = `📍 ${g.address.city || g.address.town || "Nearby"}`;
                } catch (e) {}
            }, () => { document.getElementById('condition').textContent = "Location Denied"; document.getElementById('weather-icon').textContent = "🌡️"; });
        }

        function updateCalendar() {
            const now = new Date();
            document.getElementById('cal-title').textContent = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay(), days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate(), grid = document.getElementById('cal-grid'); 
            grid.innerHTML = ''; ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
            for (let i = 0; i < first; i++) grid.innerHTML += `<div class="day-cell"></div>`;
            for (let d = 1; d <= days; d++) grid.innerHTML += `<div class="day-cell">${d === now.getDate() ? `<div class="today-circle">${d}</div>` : d}</div>`;
        }

        function trySaveWP(data) {
            try {
                const test = { ...state, wallpaper: data };
                localStorage.setItem('standby_v20', JSON.stringify(test));
                state.wallpaper = data;
                document.getElementById('wallpaper-bg').style.backgroundImage = `url(${data})`;
                const s = document.getElementById('wp-status'); s.textContent = "✓ Saved"; s.className = "status-success";
                setTimeout(() => s.textContent = "", 2000);
                return true;
            } catch (e) { return false; }
        }

        async function processWP(file) {
            const r = new FileReader();
            r.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const run = (mW, q) => {
                        const c = document.createElement('canvas'); let w = img.width, h = img.height;
                        if (w > mW) { h *= mW/w; w = mW; }
                        c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h);
                        return c.toDataURL('image/jpeg', q);
                    };
                    if (!trySaveWP(run(1280, 0.75))) { if (!trySaveWP(run(1280, 0.5))) { if (!trySaveWP(run(800, 0.5))) alert("Storage full."); } }
                };
                img.src = ev.target.result;
            };
            r.readAsDataURL(file);
        }

        function init() {
            const saved = localStorage.getItem('standby_v20');
            if (saved) state = { ...state, ...JSON.parse(saved) };
            if (state.wallpaper) document.getElementById('wallpaper-bg').style.backgroundImage = `url(${state.wallpaper})`;
            document.getElementById('check-seconds').checked = state.showSeconds;
            document.getElementById('check-date').checked = state.showDate;
            document.getElementById('check-day').checked = state.showDay;
            document.getElementById('clock-size-slider').value = sizes.indexOf(state.clockSize);
            
            applyGrid(); 
            const wx = document.getElementById('weather-widget'), wr = wx.getBoundingClientRect();
            updateWeatherScaling(wx, wr.width, wr.height);
            
            updateActiveCards(); initResizeObservers(); updateCalendar(); fetchWeather(); 
            setInterval(fetchWeather, 600000); initGridInteraction(); getWakeLock(); 
            const t = () => { updateClock(); setTimeout(t, 1000 - (Date.now() % 1000)); }; t();
            const mr = () => { const n = new Date(), tm = new Date(n.getFullYear(), n.getMonth(), n.getDate() + 1); setTimeout(() => { updateCalendar(); updateClock(); mr(); }, tm - n); }; mr();
        }

        window.addEventListener('orientationchange', () => {
            state.gridL = { c: 1, r: 1 }; state.gridP = { r1: 1, r2: 1, r3: 1 };
            applyGrid(); updateClock();
            localStorage.setItem('standby_v20', JSON.stringify(state));
        });

        const modal = document.getElementById('settings-modal');
        document.getElementById('settings-btn').onclick = () => modal.style.display = 'flex';
        document.getElementById('modal-cancel').onclick = () => modal.style.display = 'none';
        modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
        document.getElementById('apply-btn').onclick = () => { localStorage.setItem('standby_v20', JSON.stringify(state)); modal.style.display = 'none'; };
        document.querySelectorAll('.preview-card').forEach(card => card.onclick = () => { state[card.dataset.key] = card.dataset.val; updateActiveCards(); updateClock(); });
        document.getElementById('clock-size-slider').oninput = (e) => { state.clockSize = sizes[e.target.value]; updateClock(); };
        ['seconds', 'date', 'day'].forEach(k => document.getElementById(`check-${k}`).onchange = (e) => { state[`show${k.charAt(0).toUpperCase()+k.slice(1)}`] = e.target.checked; updateClock(); });
        document.getElementById('wp-input').onchange = (e) => { if (e.target.files[0]) processWP(e.target.files[0]); };
        function updateActiveCards() {
            document.querySelectorAll('.preview-card').forEach(card => card.classList.toggle('active', state[card.dataset.key] === card.dataset.val));
            document.getElementById('digital-options').style.display = state.clockStyle === 'digital' ? 'block' : 'none';
            document.getElementById('analogue-faces').style.display = state.clockStyle === 'analogue' ? 'block' : 'none';
        }
        init();
    </script>
</body>
</html>
